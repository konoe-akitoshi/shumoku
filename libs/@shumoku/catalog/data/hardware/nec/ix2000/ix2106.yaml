# NEC UNIVERGE IX2106 — compact branch router
# Source: https://jpn.nec.com/univerge/ix/Info/ix2106.html
# 1× WAN (GE0) + 4-port internal LAN switch (GE1). IPv4 forwarding 2 Gbps,
# IPsec 1.2 Gbps. L2TPv2 (not v3). End-of-sale 2024-03.
id: nec/ix2000/ix2106
label: NEC UNIVERGE IX2106
extends: nec/ix2000
spec:
  kind: hardware
  type: router
  vendor: nec
  model: ix2106
tags: [compact, fanless, l2tp]
properties:
  power:
    max_draw_w: 7
  ports:
    wan:
      # GE0: single 10/100/1000BASE-T WAN port
      - { names: ["GE0"], faceplate_labels: ["GE0"], interface_names: ["GigaEthernet0.0"], speed: "1g", cage: rj45 }
    lan:
      # GE1 (SW-HUB): 4-port 1G L2 switch — all jacks share GigaEthernet1.0
      - { count: 4, name_pattern: "GE1.0/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigaEthernet1.0", speed: "1g", cage: rj45 }
  physical:
    form_factor: compact
    fanless: true
    dimensions_mm: { w: 135, d: 196, h: 36 }
    operating_temp_c: { min: 0, max: 50 }
    mounting: [desk, wall, rack]
  management:
    layer: 3
    dram_mb: 256
    protocols: [ipsec, ikev1, ikev2, l2tpv2, l2tp-ipsec, etherip, gre, ospf, bgp4, pppoe, dhcp, nat, snmp-v1, snmp-v2c, snmp-v3, ssh, telnet]
