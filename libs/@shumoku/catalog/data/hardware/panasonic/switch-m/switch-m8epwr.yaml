# Panasonic Switch-M8ePWR (PN27089K) — 8-port PoE managed switch
# Source: https://panasonic.co.jp/ew/pewnw/product/lan/m8epwr_new.html
# Note: 10/100BASE-TX downlink ports (not Gigabit)
id: panasonic/switch-m/switch-m8epwr
label: Switch-M8ePWR (PN27089K)
extends: panasonic/switch-m
spec:
  kind: hardware
  type: l2-switch
  vendor: panasonic
  model: switch-m8epwr
tags: [poe-source]
properties:
  power:
    max_draw_w: 161
    idle_draw_w: 10.6
    poe_out:
      standard: "802.3af"
      budget_w: 124
      max_per_port_w: 15.4
      ports: 8
  switching:
    capacity_gbps: 5.6
    forwarding_rate_mpps: 4.1
    mac_table_size: 16000
    buffer_mb: 1.5
  ports:
    downlink:
      - { names: ["1", "2", "3", "4", "5", "6", "7", "8"], speed: "100m", cage: rj45, poe: true }
    uplink:
      # Combo ports 9, 10: each has RJ45 jack + SFP slot sharing one interface (mutually exclusive).
      - { names: ["9"],      faceplate_labels: ["9"],     interface_names: ["9"],  speed: "1g", cage: rj45 }
      - { names: ["9(SFP)"], faceplate_labels: ["9 SFP"], interface_names: ["9"],  speed: "1g", cage: sfp }
      - { names: ["10"],     faceplate_labels: ["10"],    interface_names: ["10"], speed: "1g", cage: rj45 }
      - { names: ["10(SFP)"],faceplate_labels: ["10 SFP"],interface_names: ["10"], speed: "1g", cage: sfp }
  physical:
    form_factor: 1U
    dimensions_mm: { w: 210, d: 280, h: 44 }
    weight_g: 2300
    mounting: [rack]
  management:
    layer: 2
    protocols: [snmp-v1, snmp-v2c, ssh, cli, web]
