name: Editor Release

on:
  push:
    tags: ['editor-v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Verify release version
        shell: bash
        run: |
          package_version="$(node -p "require('./apps/editor/package.json').version")"
          tag_version="${GITHUB_REF_NAME#editor-v}"

          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "::error::Editor release tags must use editor-vX.Y.Z or editor-vX.Y.Z-beta.N"
            exit 1
          fi

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "::error::Tag editor-v${tag_version} does not match @shumoku/editor ${package_version}"
            exit 1
          fi

      - name: Generate release notes
        env:
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if ! bash scripts/release-notes.sh editor "$GITHUB_REF_NAME" > release-notes.md 2>/dev/null || [ ! -s release-notes.md ]; then
            printf '**Shumoku Editor %s** — https://editor.shumoku.dev/\n' "${GITHUB_REF_NAME#editor-v}" > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists"
          elif [[ "$GITHUB_REF_NAME" == *-beta.* ]]; then
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --notes-file release-notes.md \
              --prerelease \
              --title "Shumoku Editor ${GITHUB_REF_NAME#editor-v}"
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --notes-file release-notes.md \
              --latest=false \
              --title "Shumoku Editor ${GITHUB_REF_NAME#editor-v}"
          fi
