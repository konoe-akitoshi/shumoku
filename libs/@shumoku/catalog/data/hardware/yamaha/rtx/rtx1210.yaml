# Yamaha RTX1210 — VPN router with 8-port switch
# Source: https://network.yamaha.com/products/routers/rtx1210/spec
# 10 GbE ports total: LAN1 (8-port internal switch), LAN2, LAN3.
# Any LAN can be configured as WAN.
id: yamaha/rtx/rtx1210
label: Yamaha RTX1210
extends: yamaha/rtx
spec:
  kind: hardware
  type: router
  vendor: yamaha
  model: rtx1210
tags: [l2tpv3, fanless]
properties:
  power:
    max_draw_w: 14.5
  ports:
    lan:
      - { count: 8, name_pattern: "LAN1.{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "LAN1", speed: "1g", connectors: [rj45] }
      - { names: ["LAN2"], faceplate_labels: ["LAN2"], speed: "1g", connectors: [rj45] }
      - { names: ["LAN3"], faceplate_labels: ["LAN3"], speed: "1g", connectors: [rj45] }
  physical:
    form_factor: desktop
    fanless: true
    dimensions_mm: { w: 220, d: 239, h: 42 }
    weight_g: 1500
    operating_temp_c: { min: 0, max: 45 }
    mounting: [desk, wall, rack]
  management:
    layer: 3
    dram_mb: 256
    flash_mb: 32
    protocols: [ipsec, ikev1, ikev2, l2tpv3, l2tp-ipsec, gre, ospf, bgp, pppoe, dhcp, nat, snmp-v1, snmp-v2c, snmp-v3, ssh, telnet, https, syslog]
