# Aruba AP-515 — WiFi 6 indoor campus AP, 4x4:4 (5G) + 2x2:2 (2.4G)
# Source: https://www.hpe.com/psnow/doc/PSN1011094558PYEN
# Regulatory model: APIN0515. Order SKU: Q9H62A (RW).
id: hpe/aruba-ap-510/aruba-ap-515
label: Aruba AP-515
extends: hpe/aruba-ap-510
spec:
  kind: hardware
  type: access-point
  vendor: hpe
  model: aruba-ap-515
tags: [poe-consumer, apin0515]
properties:
  power:
    max_draw_w: 20.8
    poe_in:
      standard: "802.3at"
      class: 4
      min_class: 3
      max_draw_w: 20.8
      by_class:
        3:
          standard: "802.3af"
          max_draw_w: 13.5
          note: "IPM-enabled reduced mode on 802.3af"
        4:
          standard: "802.3at"
          max_draw_w: 20.8
  wireless:
    standard: wifi-6
    radios: 2
    mimo: "4x4:4"
    bands: ["2.4ghz", "5ghz"]
    antenna_type: internal
    max_data_rate_mbps: 2690
  ports:
    uplink:
      - { names: ["E0"], speed: "2.5g", connectors: [rj45], poe: true }
    lan:
      - { names: ["E1"], speed: "1g", connectors: [rj45] }
  physical:
    form_factor: ceiling
    dimensions_mm: { w: 200, d: 200, h: 46 }
    weight_g: 810
    mounting: [ceiling, wall]
