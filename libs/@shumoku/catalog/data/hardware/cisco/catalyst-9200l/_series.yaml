# Cisco Catalyst 9200L Series — fixed-uplink stackable access switches
# Source: https://www.cisco.com/c/en/us/products/collateral/switches/catalyst-9200-series-switches/nb-06-cat9200-ser-data-sheet-cte-en.html
id: cisco/catalyst-9200l
label: Catalyst 9200L Series
spec:
  kind: hardware
  type: l3-switch
  vendor: cisco
tags: [l3-switch, stackable, access, enterprise]
properties:
  switching:
    mac_table_size: 16000
    vlan_count: 4094
    jumbo_frame_bytes: 9198
  physical:
    form_factor: 1U
    fanless: false
    operating_temp_c: { min: -5, max: 45 }
    mounting: [rack]
  management:
    stackable: true
    stack_members_max: 8
    protocols: [snmp-v1, snmp-v2c, snmp-v3, ssh, telnet, https, netconf, restconf, syslog, radius, tacacs+]
    dram_mb: 2048
    flash_mb: 4096
