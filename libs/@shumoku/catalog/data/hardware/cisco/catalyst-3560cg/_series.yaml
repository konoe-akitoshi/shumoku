# Cisco Catalyst 3560-CG Compact Series
# Source: https://www.cisco.com/c/en/us/products/collateral/switches/catalyst-3560-c-series-switches/data_sheet_c78-639986.html
# Note: End-of-Sale; predecessor to 3560-CX
id: cisco/catalyst-3560cg
label: Catalyst 3560-CG Compact Series
spec:
  kind: hardware
  type: l3-switch
  vendor: cisco
tags: [l3-switch, compact, fanless, campus]
properties:
  switching:
    mac_table_size: 12000
    vlan_count: 1005
    jumbo_frame_bytes: 9198
  physical:
    form_factor: compact
    fanless: true
    operating_temp_c: { min: -5, max: 45 }
    mounting: [desk, wall, rack]
  management:
    stackable: false
    protocols: [snmp-v1, snmp-v2c, snmp-v3, ssh, telnet, http, https, tftp, syslog, radius, tacacs+]
    dram_mb: 128
    flash_mb: 64
