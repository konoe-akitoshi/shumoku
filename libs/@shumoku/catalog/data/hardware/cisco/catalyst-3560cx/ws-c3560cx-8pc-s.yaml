# Cisco WS-C3560CX-8PC-S — 8-port PoE+ compact switch
id: cisco/catalyst-3560cx/ws-c3560cx-8pc-s
label: WS-C3560CX-8PC-S
extends: cisco/catalyst-3560cx
spec:
  kind: hardware
  type: l3-switch
  vendor: cisco
  model: ws-c3560cx-8pc-s
tags: [poe-source]
properties:
  power:
    max_draw_w: 300
    poe_out:
      standard: "802.3at"
      budget_w: 240
      max_per_port_w: 30
      ports: 8
  switching:
    capacity_gbps: 22
    forwarding_rate_mpps: 16.07
  ports:
    downlink:
      - { count: 8, name_pattern: "Gi1/0/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigabitEthernet1/0/{n}", speed: "1g", connector: rj45, poe: true }
    uplink:
      - { names: ["Gi1/0/9", "Gi1/0/10"], faceplate_labels: ["9", "10"], interface_names: ["GigabitEthernet1/0/9", "GigabitEthernet1/0/10"], speed: "1g", connector: rj45 }
      - { names: ["Gi1/0/11", "Gi1/0/12"], faceplate_labels: ["11", "12"], interface_names: ["GigabitEthernet1/0/11", "GigabitEthernet1/0/12"], speed: "1g", connector: sfp }
  management:
    layer: 2
    image: lan-base
