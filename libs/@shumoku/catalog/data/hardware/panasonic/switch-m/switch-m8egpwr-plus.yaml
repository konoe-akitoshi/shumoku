# Panasonic Switch-M8eGPWR+ (PN28089K) — 8-port Gigabit PoE+ managed switch
# Source: https://panasonic.co.jp/ew/pewnw/product/lan/m8egpwr_new.html
id: panasonic/switch-m/switch-m8egpwr-plus
label: Switch-M8eGPWR+ (PN28089K)
extends: panasonic/switch-m
spec:
  kind: hardware
  type: l2-switch
  vendor: panasonic
  model: switch-m8egpwr-plus
tags: [poe-source, poe-plus]
properties:
  power:
    max_draw_w: 310
    idle_draw_w: 17
    poe_out:
      standard: "802.3at"
      budget_w: 240
      max_per_port_w: 30
      ports: 8
  switching:
    capacity_gbps: 20
    forwarding_rate_mpps: 14.8
    mac_table_size: 8000
  ports:
    downlink:
      - { names: ["1", "2", "3", "4", "5", "6", "7", "8"], speed: "1g", cage: rj45, poe: true }
    uplink:
      # Combo ports 9, 10: each has RJ45 jack + SFP slot sharing one interface (mutually exclusive).
      - { names: ["9"],      faceplate_labels: ["9"],     interface_names: ["9"],  speed: "1g", cage: rj45 }
      - { names: ["9(SFP)"], faceplate_labels: ["9 SFP"], interface_names: ["9"],  speed: "1g", cage: sfp }
      - { names: ["10"],     faceplate_labels: ["10"],    interface_names: ["10"], speed: "1g", cage: rj45 }
      - { names: ["10(SFP)"],faceplate_labels: ["10 SFP"],interface_names: ["10"], speed: "1g", cage: sfp }
  physical:
    form_factor: 1U
    dimensions_mm: { w: 330, d: 250, h: 44 }
    weight_g: 3000
    mounting: [rack]
  management:
    layer: 2
    protocols: [snmp-v1, snmp-v2c, ssh, cli, web]
