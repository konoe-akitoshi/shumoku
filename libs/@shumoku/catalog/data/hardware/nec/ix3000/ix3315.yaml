# NEC UNIVERGE IX3315 — enterprise edge router
# Source: NEC IX3000 series user manual (UM-IX3000-ver10.11)
# Port layout: GE0/GE1 = 1G combo (RJ45 1000BASE-T or SFP 1000BASE-X),
#              GE2/GE3 = 10G combo (RJ45 1000/10GBASE-T or SFP+ 10GBASE-R),
#              GE4(SW-HUB) and GE5(SW-HUB) = 8-port 1G L2 switches each.
# IPv4 forwarding 10 Gbps, IPsec 4 Gbps.
id: nec/ix3000/ix3315
label: NEC UNIVERGE IX3315
extends: nec/ix3000
spec:
  kind: hardware
  type: router
  vendor: nec
  model: ix3315
tags: [openflow, sdn]
properties:
  power:
    max_draw_w: 75
  ports:
    wan:
      # GE0: 1G combo — RJ45 (1000BASE-T) and SFP (1000BASE-SX/LX) share GigaEthernet0.0 (mutually exclusive)
      - { names: ["GE0"],      faceplate_labels: ["GE0"],     interface_names: ["GigaEthernet0.0"], speed: "1g", cage: rj45 }
      - { names: ["GE0(SFP)"], faceplate_labels: ["GE0 SFP"], interface_names: ["GigaEthernet0.0"], speed: "1g", cage: sfp }
      # GE1: 1G combo
      - { names: ["GE1"],      faceplate_labels: ["GE1"],     interface_names: ["GigaEthernet1.0"], speed: "1g", cage: rj45 }
      - { names: ["GE1(SFP)"], faceplate_labels: ["GE1 SFP"], interface_names: ["GigaEthernet1.0"], speed: "1g", cage: sfp }
      # GE2: 10G combo — RJ45 (1000/10GBASE-T) and SFP+ (10GBASE-SR/LR) share GigaEthernet2.0
      - { names: ["GE2"],       faceplate_labels: ["GE2"],      interface_names: ["GigaEthernet2.0"], speed: "10g", cage: rj45 }
      - { names: ["GE2(SFP+)"], faceplate_labels: ["GE2 SFP+"], interface_names: ["GigaEthernet2.0"], speed: "10g", cage: sfp+ }
      # GE3: 10G combo
      - { names: ["GE3"],       faceplate_labels: ["GE3"],      interface_names: ["GigaEthernet3.0"], speed: "10g", cage: rj45 }
      - { names: ["GE3(SFP+)"], faceplate_labels: ["GE3 SFP+"], interface_names: ["GigaEthernet3.0"], speed: "10g", cage: sfp+ }
    lan:
      # GE4 (SW-HUB): 8-port 1G L2 switch — all jacks share GigaEthernet4.0
      - { count: 8, name_pattern: "GE4.0/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigaEthernet4.0", speed: "1g", cage: rj45 }
      # GE5 (SW-HUB): 8-port 1G L2 switch — all jacks share GigaEthernet5.0
      - { count: 8, name_pattern: "GE5.0/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigaEthernet5.0", speed: "1g", cage: rj45 }
  physical:
    form_factor: 1U
    fanless: false
    dimensions_mm: { w: 430, d: 393, h: 43 }
    weight_g: 5500
    mounting: [rack]
  management:
    layer: 3
    protocols: [ipsec, ikev1, ikev2, l2tpv2, l2tp-ipsec, etherip, gre, ospfv2, ospfv3, bgp4, pppoe, dhcp, nat, openflow, snmp-v1, snmp-v2c, snmp-v3, ssh, telnet]
