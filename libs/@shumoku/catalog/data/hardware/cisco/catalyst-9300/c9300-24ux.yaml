# Cisco C9300-24UX — 24×mGig (100M/1G/2.5G/5G/10G) UPOE + modular uplink
# UPOE delivers 60W per port (Cisco proprietary, predates 802.3bt)
id: cisco/catalyst-9300/c9300-24ux
label: C9300-24UX
extends: cisco/catalyst-9300
spec:
  kind: hardware
  type: l3-switch
  vendor: cisco
  model: c9300-24ux
tags: [poe-source, upoe, mgig]
properties:
  switching:
    capacity_gbps: 640
    forwarding_rate_mpps: 476.19
  power:
    poe_out:
      standard: cisco-upoe
      budget_w: 560   # single 1100W PSU; 1440W with dual 1100W
      max_per_port_w: 60
      ports: 24
  physical:
    dimensions_mm: { w: 445, d: 513, h: 44 }
    weight_g: 8250
  ports:
    downlink:
      # mGig ports: interface name varies with negotiated speed
      # (Two/Five/TenGigabitEthernet). "10g" = max line rate.
      - { count: 24, name_pattern: "Gi1/0/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigabitEthernet1/0/{n}", speed: "10g", cage: rj45, poe: true }
    # uplink: modular Network Module slot (NM-2Q / NM-4G / NM-4M / NM-8X / NM-2Y).
    # Modeled per-NM as a separate entry; left empty here.
  management:
    layer: 3
    image: network-advantage
