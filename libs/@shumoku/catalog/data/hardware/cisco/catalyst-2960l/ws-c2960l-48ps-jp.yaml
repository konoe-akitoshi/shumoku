# Cisco WS-C2960L-48PS-JP — 48-port PoE+ L2 switch + 4 SFP uplinks (Japan SKU)
id: cisco/catalyst-2960l/ws-c2960l-48ps-jp
label: WS-C2960L-48PS-JP
extends: cisco/catalyst-2960l
spec:
  kind: hardware
  type: l2-switch
  vendor: cisco
  model: ws-c2960l-48ps-jp
tags: [poe-source, japan-sku]
properties:
  power:
    poe_out:
      standard: "802.3at"
      budget_w: 370
      max_per_port_w: 30
      ports: 48
  switching:
    capacity_gbps: 104
    forwarding_rate_mpps: 77.38
  physical:
    fanless: false
  ports:
    downlink:
      - { count: 48, name_pattern: "Gi1/0/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigabitEthernet1/0/{n}", speed: "1g", cage: rj45, poe: true }
    uplink:
      - { names: ["Gi1/0/49", "Gi1/0/50", "Gi1/0/51", "Gi1/0/52"], faceplate_labels: ["49", "50", "51", "52"], interface_names: ["GigabitEthernet1/0/49", "GigabitEthernet1/0/50", "GigabitEthernet1/0/51", "GigabitEthernet1/0/52"], speed: "1g", cage: sfp }
  management:
    layer: 2
    image: lan-lite
