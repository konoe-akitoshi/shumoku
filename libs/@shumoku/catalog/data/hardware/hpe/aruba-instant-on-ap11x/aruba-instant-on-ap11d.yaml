# Aruba Instant On AP11D — WiFi 5 desk/wall AP with PoE passthrough
# Source: https://www.arubainstanton.com/products/access-points/ap11d/
# Note: E3 port provides PoE-out (802.3af, 15.4W) only when powered via 802.3at.
# Regulatory model: APINH303.
id: hpe/aruba-instant-on-ap11x/aruba-instant-on-ap11d
label: Aruba Instant On AP11D
extends: hpe/aruba-instant-on-ap11x
spec:
  kind: hardware
  type: access-point
  vendor: hpe
  model: aruba-instant-on-ap11d
tags: [desktop, poe-consumer, poe-passthrough, apinh303]
properties:
  power:
    max_draw_w: 27.4
    poe_in:
      standard: "802.3at"
      class: 4
      max_draw_w: 27.4
    poe_out:
      standard: "802.3af"
      budget_w: 15.4
      max_per_port_w: 15.4
      ports: 1
  wireless:
    standard: wifi-5
    radios: 2
    mimo: "2x2"
    bands: ["2.4ghz", "5ghz"]
    antenna_type: internal
  ports:
    downlink:
      - { names: ["E1", "E2"], speed: "1g", connectors: [rj45] }
      - { names: ["E3"], speed: "1g", connectors: [rj45], poe: true }
    uplink:
      - { names: ["E0/PT"], speed: "1g", connectors: [rj45] }
  physical:
    form_factor: desktop
    dimensions_mm: { w: 86, d: 150, h: 40 }
    weight_g: 313
    mounting: [desk, wall]
