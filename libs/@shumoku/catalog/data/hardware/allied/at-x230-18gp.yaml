      - { count: 16, name_pattern: "port1.0.{n}", faceplate_label_pattern: "{n}", speed: "1g", cage: rj45, poe: true }
    uplink:
      - { names: ["port1.0.17", "port1.0.18"], faceplate_labels: ["17", "18"], speed: "1g", cage: sfp }
  physical:
    form_factor: 1U
    fanless: false
    dimensions_mm: { w: 341, d: 231, h: 44 }
    weight_g: 3000
    mounting: [rack, desk]
  management:
    layer: 3
    stackable: false
    image: alliedware-plus
    protocols: [ssh, telnet, http, https, snmp-v1, snmp-v2c, snmp-v3, lldp, rip, static-routing]
