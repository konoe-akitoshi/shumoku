id: hpe/aruba-ap-505
label: Aruba AP-505
spec:
  kind: hardware
  type: access-point
  vendor: hpe
  model: aruba-ap-505
tags: [wifi-6, indoor, ceiling-mount, poe-consumer]
properties:
