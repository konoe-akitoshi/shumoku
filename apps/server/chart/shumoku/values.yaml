  #   thresholds:
  #     - value: 0
  #       color: '#73BF69'
  #     - value: 50
  #       color: '#FADE2A'
  #     - value: 75
  #       color: '#FF9830'
  #     - value: 90
  #       color: '#FF0000'

env: []

nodeSelector: {}

tolerations: []

affinity: {}
