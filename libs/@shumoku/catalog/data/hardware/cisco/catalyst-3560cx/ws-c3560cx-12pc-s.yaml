# Cisco WS-C3560CX-12PC-S — 12-port PoE+ compact switch
id: cisco/catalyst-3560cx/ws-c3560cx-12pc-s
label: WS-C3560CX-12PC-S
extends: cisco/catalyst-3560cx
spec:
  kind: hardware
  type: l3-switch
  vendor: cisco
  model: ws-c3560cx-12pc-s
tags: [poe-source]
properties:
  power:
    max_draw_w: 310
    poe_out:
      standard: "802.3at"
      budget_w: 240
      max_per_port_w: 30
      ports: 12
  switching:
    capacity_gbps: 28
    forwarding_rate_mpps: 20.83
  ports:
    downlink:
      - { count: 12, name_pattern: "Gi1/0/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigabitEthernet1/0/{n}", speed: "1g", connector: rj45, poe: true }
    uplink:
      - { names: ["Gi1/0/13", "Gi1/0/14"], faceplate_labels: ["13", "14"], interface_names: ["GigabitEthernet1/0/13", "GigabitEthernet1/0/14"], speed: "1g", connector: rj45 }
      - { names: ["Gi1/0/15", "Gi1/0/16"], faceplate_labels: ["15", "16"], interface_names: ["GigabitEthernet1/0/15", "GigabitEthernet1/0/16"], speed: "1g", connector: sfp }
  management:
    layer: 2
    image: lan-base
