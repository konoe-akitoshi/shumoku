# Cisco WS-C3560CX-8TC-S — 8-port non-PoE compact switch
id: cisco/catalyst-3560cx/ws-c3560cx-8tc-s
label: WS-C3560CX-8TC-S
extends: cisco/catalyst-3560cx
spec:
  kind: hardware
  type: l3-switch
  vendor: cisco
  model: ws-c3560cx-8tc-s
tags: []
properties:
  power:
    max_draw_w: 24
  switching:
    capacity_gbps: 22
    forwarding_rate_mpps: 16.07
  ports:
    downlink:
      - { count: 8, name_pattern: "Gi1/0/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigabitEthernet1/0/{n}", speed: "1g", connector: rj45 }
    uplink:
      - { names: ["Gi1/0/9", "Gi1/0/10"], faceplate_labels: ["9", "10"], interface_names: ["GigabitEthernet1/0/9", "GigabitEthernet1/0/10"], speed: "1g", connector: rj45 }
      - { names: ["Gi1/0/11", "Gi1/0/12"], faceplate_labels: ["11", "12"], interface_names: ["GigabitEthernet1/0/11", "GigabitEthernet1/0/12"], speed: "1g", connector: sfp }
  management:
    layer: 2
    image: lan-base
