name: Docker

on:
  push:
    branches: [main]
    tags: ['server-v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # keyless Cosign signing via Sigstore/OIDC

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve build information
        id: build
        shell: bash
        run: |
          echo "version=$(node -p "require('./apps/server/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/server-v* ]]; then
            if [[ "$GITHUB_REF_NAME" == *-beta.* ]]; then
              echo "channel=beta" >> "$GITHUB_OUTPUT"
            else
              echo "channel=stable" >> "$GITHUB_OUTPUT"
            fi
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=development" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release version
        if: steps.build.outputs.release == 'true'
        shell: bash
        run: |
          package_version="${{ steps.build.outputs.version }}"
          tag_version="${GITHUB_REF_NAME#server-v}"

          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "::error::Server release tags must use server-vX.Y.Z or server-vX.Y.Z-beta.N"
            exit 1
          fi

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "::error::Tag server-v${tag_version} does not match @shumoku/server ${package_version}"
            exit 1
          fi

      - name: Log in to Container Registry
        if: steps.build.outputs.release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.build.outputs.version }},enable=${{ steps.build.outputs.release == 'true' }}
            type=raw,value=latest,enable=${{ steps.build.outputs.channel == 'stable' }}
            type=raw,value=beta,enable=${{ steps.build.outputs.channel == 'beta' }}
            type=raw,value=edge,enable=${{ steps.build.outputs.release == 'true' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          # Cross-build arm64 only for real releases (QEMU emulation is slow);
          # PR builds stay amd64-only just to validate the Dockerfile.
          platforms: ${{ steps.build.outputs.release == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ steps.build.outputs.release == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SHUMOKU_VERSION=${{ steps.build.outputs.version }}
            SHUMOKU_COMMIT=${{ github.sha }}
            SHUMOKU_BUILD_DATE=${{ steps.build.outputs.built_at }}
            SHUMOKU_CHANNEL=${{ steps.build.outputs.channel }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach an SBOM and SLSA provenance to released images (pushed as
          # OCI attestations). Only on release, since they require the image
          # to actually be pushed.
          sbom: ${{ steps.build.outputs.release == 'true' }}
          provenance: ${{ steps.build.outputs.release == 'true' && 'mode=max' || 'false' }}

      - name: Install Cosign
        if: steps.build.outputs.release == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign the published image (keyless)
        if: steps.build.outputs.release == 'true'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        shell: bash
        run: |
          # Keyless signing via GitHub OIDC — no long-lived keys. Signs the
          # immutable digest so every tag pointing at it is covered.
          cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

  release:
    if: startsWith(github.ref, 'refs/tags/server-v')
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate release notes
        env:
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if ! bash scripts/release-notes.sh server "$GITHUB_REF_NAME" > release-notes.md 2>/dev/null || [ ! -s release-notes.md ]; then
            printf '**Shumoku Server %s**\n' "${GITHUB_REF_NAME#server-v}" > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists"
          elif [[ "$GITHUB_REF_NAME" == *-beta.* ]]; then
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --notes-file release-notes.md \
              --prerelease \
              --title "Shumoku Server ${GITHUB_REF_NAME#server-v}"
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --notes-file release-notes.md \
              --latest \
              --title "Shumoku Server ${GITHUB_REF_NAME#server-v}"
          fi
