# Allied Telesis AT-x230-18GP — 16-port PoE+ L3-lite switch + 2 SFP uplinks
# Source: https://www.alliedtelesis.com/us/en/products/switches/x230-series/x230-18gp
id: allied/at-x230-18gp
label: Allied Telesis AT-x230-18GP
spec:
  kind: hardware
  type: l3-switch
  vendor: allied
  model: at-x230-18gp
tags: [l3-switch, poe-source, alliedware-plus]
properties:
