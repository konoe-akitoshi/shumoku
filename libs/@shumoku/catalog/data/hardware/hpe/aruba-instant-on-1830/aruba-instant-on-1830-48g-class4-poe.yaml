    form_factor: 1U
    fanless: true
    mounting: [rack, desk]
  management:
    layer: 2
    stackable: false
    dram_mb: 512
    flash_mb: 256
    protocols: [snmp-v1, snmp-v2c, ssh, https, lldp, lacp, igmp-snooping, stp, rstp, mstp]
