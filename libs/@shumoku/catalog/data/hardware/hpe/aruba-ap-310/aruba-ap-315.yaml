# Aruba AP-315 — WiFi 5 indoor campus AP, 4x4:4 (5G) + 2x2:2 (2.4G)
# Regulatory model: APIN0315. Order SKU: JW797A (controller-managed RW),
# JW811A (Instant RW), JW810A (Instant JP).
id: hpe/aruba-ap-310/aruba-ap-315
label: Aruba AP-315
extends: hpe/aruba-ap-310
spec:
  kind: hardware
  type: access-point
  vendor: hpe
  model: aruba-ap-315
tags: [poe-consumer, apin0315]
properties:
  power:
    max_draw_w: 14.4
    poe_in:
      standard: "802.3at"
      class: 4
      min_class: 3
      max_draw_w: 14.4
      by_class:
        3:
          standard: "802.3af"
          max_draw_w: 13.6
          note: "On 802.3af without IPM: USB disabled, 2.4 GHz TX -3 dB"
        4:
          standard: "802.3at"
          max_draw_w: 14.4
  wireless:
    standard: wifi-5
    radios: 2
    mimo: "4x4:4"
    bands: ["2.4ghz", "5ghz"]
    antenna_type: internal
    max_data_rate_mbps: 2033
  ports:
    uplink:
      - { names: ["E0"], speed: "1g", cage: rj45, poe: true }
  physical:
    form_factor: ceiling
    dimensions_mm: { w: 182, d: 180, h: 48 }
    weight_g: 650
    mounting: [ceiling, wall]
    operating_temp_c: { min: 0, max: 50 }
