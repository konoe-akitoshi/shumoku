# Cisco WS-C4948E — 48×1G + 4×10G SFP+ top-of-rack L3 switch
id: cisco/catalyst-4948e/ws-c4948e
label: WS-C4948E
extends: cisco/catalyst-4948e
spec:
  kind: hardware
  type: l3-switch
  vendor: cisco
  model: ws-c4948e
properties:
  power:
    max_draw_w: 300
  ports:
    downlink:
      - { count: 48, name_pattern: "Gi1/{n}", faceplate_label_pattern: "{n}", interface_name_pattern: "GigabitEthernet1/{n}", speed: "1g", cage: rj45 }
    uplink:
      - { names: ["Te1/49", "Te1/50", "Te1/51", "Te1/52"], faceplate_labels: ["49", "50", "51", "52"], interface_names: ["TenGigabitEthernet1/49", "TenGigabitEthernet1/50", "TenGigabitEthernet1/51", "TenGigabitEthernet1/52"], speed: "10g", cage: sfp+ }
  management:
    layer: 3
    image: ip-base
