# Aruba Instant On 1830 48G 24p Class4 PoE 4SFP 370W (JL815A)
# Source: https://www.arubanetworks.com/products/switches/instant-on/1830/
# 48 RJ45 + 4 SFP. First 24 RJ45 ports support 802.3at PoE+ (370W budget).
id: hpe/aruba-instant-on-1830/aruba-instant-on-1830-48g-class4-poe
label: Aruba Instant On 1830 48G PoE+ (JL815A)
extends: hpe/aruba-instant-on-1830
spec:
  kind: hardware
  type: l2-switch
  vendor: hpe
  model: aruba-instant-on-1830-48g-class4-poe
tags: [poe-source, fanless, jl815a]
properties:
  power:
    max_draw_w: 462.5
    poe_out:
      standard: "802.3at"
      budget_w: 370
